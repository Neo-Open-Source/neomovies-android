name: Android Release

on:
  release:
    types:
      - published

  workflow_dispatch:
    inputs:
      tag:
        description: 'Git tag to build'
        required: true
        type: string
      prerelease:
        description: 'Build prerelease variant'
        required: true
        default: true
        type: boolean
      upload_to_release:
        description: 'Upload APK to releases'
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      FORGEJO_API_URL: https://git.disroot.org/api/v1
      FORGEJO_OWNER: Neo
      FORGEJO_REPO: neomovies-android

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fix gradlew permissions
        run: chmod +x ./gradlew

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Detect version and channel
        id: meta
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            TAG_NAME="${{ github.event.release.tag_name }}"
            IS_PRERELEASE="${{ github.event.release.prerelease }}"
            UPLOAD_TO_RELEASE=true
          else
            TAG_NAME="${{ inputs.tag }}"
            IS_PRERELEASE="${{ inputs.prerelease }}"
            UPLOAD_TO_RELEASE="${{ inputs.upload_to_release }}"
          fi

          VERSION="${TAG_NAME#v}"

          if [[ "$IS_PRERELEASE" == "true" ]]; then
            VARIANT=prerelease
            TASK=assemblePrerelease
            TV_VARIANT=tvPrerelease
            TV_TASK=assembleTvPrerelease
          else
            VARIANT=release
            TASK=assembleRelease
            TV_VARIANT=tvRelease
            TV_TASK=assembleTvRelease
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "is_prerelease=$IS_PRERELEASE" >> $GITHUB_OUTPUT
          echo "variant=$VARIANT" >> $GITHUB_OUTPUT
          echo "task=$TASK" >> $GITHUB_OUTPUT
          echo "tv_variant=$TV_VARIANT" >> $GITHUB_OUTPUT
          echo "tv_task=$TV_TASK" >> $GITHUB_OUTPUT
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "upload_to_release=$UPLOAD_TO_RELEASE" >> $GITHUB_OUTPUT

      - name: Setup prerelease keystore
        if: ${{ steps.meta.outputs.is_prerelease == 'true' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "RELEASE_KEYSTORE_BASE64 secret not set, skipping keystore setup"
            exit 0
          fi

          echo "$KEYSTORE_BASE64" | tr -d '\n\r ' | base64 -d > "$RUNNER_TEMP/release.keystore"

          echo "RELEASE_KEYSTORE_PATH=$RUNNER_TEMP/release.keystore" >> $GITHUB_ENV
          echo "RELEASE_KEYSTORE_PASSWORD=${{ secrets.RELEASE_KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
          echo "RELEASE_KEY_ALIAS=${{ secrets.RELEASE_KEY_ALIAS }}" >> $GITHUB_ENV
          echo "RELEASE_KEY_PASSWORD=${{ secrets.RELEASE_KEY_PASSWORD }}" >> $GITHUB_ENV

      - name: Build APKs
        env:
          CI: 'true'
          APP_VERSION: ${{ steps.meta.outputs.version }}
          NEO_ID_API_KEY: ${{ secrets.NEO_ID_API_KEY }}
          NEO_ID_SITE_ID: ${{ secrets.NEO_ID_SITE_ID }}
        run: ./gradlew :app:${{ steps.meta.outputs.task }} :app:${{ steps.meta.outputs.tv_task }} --build-cache --no-daemon

      - name: Locate APKs
        id: apk
        shell: bash
        run: |
          set -e
          APK_DIR="app/build/outputs/apk/${{ steps.meta.outputs.variant }}"
          TV_APK_DIR="app/build/outputs/apk/${{ steps.meta.outputs.tv_variant }}"

          echo "dir=$APK_DIR" >> $GITHUB_OUTPUT
          echo "tv_dir=$TV_APK_DIR" >> $GITHUB_OUTPUT
          echo "count=$(ls -1 "$APK_DIR"/*.apk | wc -l | xargs)" >> $GITHUB_OUTPUT
          echo "tv_count=$(ls -1 "$TV_APK_DIR"/*.apk | wc -l | xargs)" >> $GITHUB_OUTPUT

      - name: Rename APKs
        id: renamed
        shell: bash
        run: |
          set -e
          IN_DIR="${{ steps.apk.outputs.dir }}"
          TV_IN_DIR="${{ steps.apk.outputs.tv_dir }}"
          OUT_DIR="$IN_DIR/renamed"
          TV_OUT_DIR="$TV_IN_DIR/renamed"

          mkdir -p "$OUT_DIR" "$TV_OUT_DIR"

          VARIANT="${{ steps.meta.outputs.variant }}"
          TV_VARIANT="${{ steps.meta.outputs.tv_variant }}"
          VERSION="${{ steps.meta.outputs.version }}"

          for f in "$IN_DIR"/*.apk; do
            b="$(basename "$f")"
            abi="universal"

            if [[ "$b" == *"arm64-v8a"* ]]; then
              abi="arm64-v8a"
            elif [[ "$b" == *"armeabi-v7a"* ]]; then
              abi="armeabi-v7a"
            elif [[ "$b" == *"universal"* ]]; then
              abi="universal"
            fi

            cp -f "$f" "$OUT_DIR/neomovies-$VARIANT-$VERSION-$abi.apk"
          done

          for f in "$TV_IN_DIR"/*.apk; do
            b="$(basename "$f")"
            abi="universal"

            if [[ "$b" == *"arm64-v8a"* ]]; then
              abi="arm64-v8a"
            elif [[ "$b" == *"armeabi-v7a"* ]]; then
              abi="armeabi-v7a"
            elif [[ "$b" == *"universal"* ]]; then
              abi="universal"
            fi

            cp -f "$f" "$TV_OUT_DIR/neomovies-tv-$TV_VARIANT-$VERSION-$abi.apk"
          done

          echo "dir=$OUT_DIR" >> $GITHUB_OUTPUT
          echo "tv_dir=$TV_OUT_DIR" >> $GITHUB_OUTPUT

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apks-${{ steps.meta.outputs.variant }}
          path: ${{ steps.renamed.outputs.dir }}/*.apk

      - name: Upload TV APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apks-${{ steps.meta.outputs.tv_variant }}
          path: ${{ steps.renamed.outputs.tv_dir }}/*.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: ${{ steps.meta.outputs.upload_to_release == 'true' }}
        with:
          tag_name: ${{ steps.meta.outputs.tag_name }}
          name: ${{ steps.meta.outputs.tag_name }}
          prerelease: ${{ steps.meta.outputs.is_prerelease }}
          files: |
            ${{ steps.renamed.outputs.dir }}/*.apk
            ${{ steps.renamed.outputs.tv_dir }}/*.apk

      - name: Create or find Forgejo Release
        id: forgejo_release
        if: ${{ steps.meta.outputs.upload_to_release == 'true' }}
        env:
          FORGEJO_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
          TAG_NAME: ${{ steps.meta.outputs.tag_name }}
          IS_PRERELEASE: ${{ steps.meta.outputs.is_prerelease }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${FORGEJO_TOKEN:-}" ]; then
            echo "FORGEJO_TOKEN secret is not set"
            exit 1
          fi

          RELEASE_URL="$FORGEJO_API_URL/repos/$FORGEJO_OWNER/$FORGEJO_REPO/releases/tags/$TAG_NAME"

          HTTP_CODE=$(curl -sS -o /tmp/forgejo-release.json -w "%{http_code}" \
            -H "Authorization: token $FORGEJO_TOKEN" \
            "$RELEASE_URL")

          if [ "$HTTP_CODE" = "200" ]; then
            echo "Forgejo release already exists"
          else
            echo "Creating Forgejo release"

            jq -n \
              --arg tag "$TAG_NAME" \
              --arg name "$TAG_NAME" \
              --argjson prerelease "$IS_PRERELEASE" \
              '{
                tag_name: $tag,
                name: $name,
                body: "",
                draft: false,
                prerelease: $prerelease
              }' > /tmp/forgejo-create-release.json

            curl -sS -f \
              -X POST \
              -H "Authorization: token $FORGEJO_TOKEN" \
              -H "Content-Type: application/json" \
              "$FORGEJO_API_URL/repos/$FORGEJO_OWNER/$FORGEJO_REPO/releases" \
              --data @/tmp/forgejo-create-release.json \
              > /tmp/forgejo-release.json
          fi

          RELEASE_ID=$(jq -r '.id' /tmp/forgejo-release.json)

          if [ -z "$RELEASE_ID" ] || [ "$RELEASE_ID" = "null" ]; then
            echo "Failed to get Forgejo release id"
            cat /tmp/forgejo-release.json
            exit 1
          fi

          echo "id=$RELEASE_ID" >> $GITHUB_OUTPUT

      - name: Upload APKs to Forgejo Release
        if: ${{ steps.meta.outputs.upload_to_release == 'true' }}
        env:
          FORGEJO_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
          RELEASE_ID: ${{ steps.forgejo_release.outputs.id }}
        shell: bash
        run: |
          set -euo pipefail

          upload_asset() {
            local file="$1"
            local name
            name="$(basename "$file")"

            echo "Uploading $name to Forgejo release..."

            curl -sS -f \
              -X POST \
              -H "Authorization: token $FORGEJO_TOKEN" \
              -F "attachment=@$file" \
              "$FORGEJO_API_URL/repos/$FORGEJO_OWNER/$FORGEJO_REPO/releases/$RELEASE_ID/assets?name=$name" \
              > /dev/null
          }

          for f in ${{ steps.renamed.outputs.dir }}/*.apk; do
            upload_asset "$f"
          done

          for f in ${{ steps.renamed.outputs.tv_dir }}/*.apk; do
            upload_asset "$f"
          done

      - name: Create release post
        if: ${{ steps.meta.outputs.upload_to_release == 'true' && steps.meta.outputs.is_prerelease == 'true' }}
        shell: bash
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          TAG="${{ steps.meta.outputs.tag_name }}"
          SLUG="release-${VERSION}"
          DATE=$(date -u +"%Y-%m-%d")

          mkdir -p site/src/content/posts/en
          cat > "site/src/content/posts/en/${SLUG}.mdx" << EOF
          export const metadata = {
            title: "NeoMovies ${VERSION} Released",
            description: "Download the latest prerelease version of NeoMovies for Android",
            date: "${DATE}",
            lang: "en",
            slug: "${SLUG}"
          }

          # NeoMovies ${VERSION}

          New prerelease version is now available for download.

          ## Download

          - [Mobile APK (universal)](https://github.com/neomovies/neomovies-android/releases/download/${TAG}/neomovies-prerelease-${VERSION}-universal.apk)
          - [TV APK (universal)](https://github.com/neomovies/neomovies-android/releases/download/${TAG}/neomovies-tv-prerelease-${VERSION}-universal.apk)

          [View all downloads on GitHub](https://github.com/neomovies/neomovies-android/releases/tag/${TAG})
          EOF

          mkdir -p site/src/content/posts/ru
          cat > "site/src/content/posts/ru/${SLUG}.mdx" << EOF
          export const metadata = {
            title: "Вышел NeoMovies ${VERSION}",
            description: "Скачайте последнюю предварительную версию NeoMovies для Android",
            date: "${DATE}",
            lang: "ru",
            slug: "${SLUG}"
          }

          # NeoMovies ${VERSION}

          Доступна новая предварительная версия для скачивания.

          ## Скачать

          - [Мобильный APK (universal)](https://github.com/neomovies/neomovies-android/releases/download/${TAG}/neomovies-prerelease-${VERSION}-universal.apk)
          - [TV APK (universal)](https://github.com/neomovies/neomovies-android/releases/download/${TAG}/neomovies-tv-prerelease-${VERSION}-universal.apk)

          [Все файлы на GitHub](https://github.com/neomovies/neomovies-android/releases/tag/${TAG})
          EOF

      - name: Commit and push release post
        if: ${{ steps.meta.outputs.upload_to_release == 'true' && steps.meta.outputs.is_prerelease == 'true' }}
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git add site/src/content/posts/

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Add release post for ${{ steps.meta.outputs.tag_name }}"
            git push origin HEAD:main
          fi
